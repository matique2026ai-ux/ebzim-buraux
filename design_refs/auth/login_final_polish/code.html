<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ebzim - Premium Authentication</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Manrope:wght@200..800&amp;family=Amiri:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#d3c5ad",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#eddec5",
                        "background": "#f9f9ff",
                        "surface-container-low": "#f3f3fa",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f0f0f7",
                        "on-tertiary-fixed-variant": "#92001f",
                        "tertiary-fixed": "#ffdad9",
                        "inverse-primary": "#82db6f",
                        "on-primary-fixed-variant": "#005300",
                        "on-secondary-fixed-variant": "#4f4533",
                        "surface-container": "#ededf4",
                        "surface-dim": "#d9d9e0",
                        "on-primary-container": "#86df72",
                        "primary-fixed": "#9df888",
                        "on-secondary-fixed": "#221b0b",
                        "on-tertiary-fixed": "#410008",
                        "inverse-surface": "#2e3036",
                        "surface": "#f9f9ff",
                        "secondary": "#685d4a",
                        "tertiary-fixed-dim": "#ffb3b2",
                        "on-error": "#ffffff",
                        "tertiary": "#82001b",
                        "surface-container-highest": "#e2e2e9",
                        "primary-container": "#006400",
                        "primary": "#004900",
                        "on-surface": "#191c20",
                        "primary-fixed-dim": "#82db6f",
                        "on-tertiary-container": "#ffb9b8",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#126e0c",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#f0e0c8",
                        "on-secondary-container": "#6c614e",
                        "surface-container-high": "#e7e8ee",
                        "on-background": "#191c20",
                        "surface-bright": "#f9f9ff",
                        "surface-variant": "#e2e2e9",
                        "outline": "#707a6a",
                        "outline-variant": "#bfcab7",
                        "tertiary-container": "#ae0027",
                        "on-primary-fixed": "#002200",
                        "on-surface-variant": "#404a3b",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Newsreader", "Amiri", "serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(211, 197, 173, 0.3);
        }
        .cinematic-bg {
            background: radial-gradient(circle at center, #004900 0%, #002200 100%);
        }
        .calligraphy-fade {
            mask-image: radial-gradient(circle, black 30%, transparent 80%);
            opacity: 0.05;
        }
        .premium-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
        }
        .btn-3d {
            box-shadow: 0 4px 0 0 #002200, 0 10px 20px -5px rgba(0,73,0,0.5);
            transition: all 0.2s ease;
        }
        .btn-3d:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 0 #002200, 0 5px 10px -2px rgba(0,73,0,0.5);
        }
    </style>
</head>
<body class="bg-[#002200] font-body text-on-surface min-h-screen flex items-center justify-center selection:bg-secondary-fixed/30 overflow-x-hidden">
<!-- Background Layer: Cinematic Heritage -->
<div class="fixed inset-0 z-0 overflow-hidden cinematic-bg">
<!-- Faded Arabic Calligraphy Pattern -->
<div class="absolute inset-0 calligraphy-fade flex items-center justify-center pointer-events-none select-none">
<div class="font-headline text-[25vw] leading-none text-surface-bright/40 whitespace-nowrap italic -rotate-12">
            الجزائر الثقافة التراث
        </div>
</div>
<!-- Ambient Light Overlays -->
<div class="absolute top-[-20%] right-[-10%] w-[800px] h-[800px] bg-primary-container/10 rounded-full blur-[150px]"></div>
<div class="absolute bottom-[-20%] left-[-10%] w-[600px] h-[600px] bg-secondary-fixed/5 rounded-full blur-[120px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-lg px-6 py-12 flex flex-col items-center">
<!-- Brand Identity Section -->
<header class="text-center mb-10 flex flex-col items-center animate-in fade-in slide-in-from-top-4 duration-1000">
<img alt="Ebzim Logo" class="h-32 md:h-40 w-auto mb-6 object-contain brightness-0 invert drop-shadow-2xl" src="https://lh3.googleusercontent.com/aida/ADBb0ujSeLZIkdzaGhiRQtr3_b9JvTENUxNSA54RLVLcu_805fZmxdl_IRNstNyxqVb2UZ4Jero7oJ5E3er5m994XSG4bnBg7Z7qGWqhgYV31K3AzD3_Ky5V8bOjfuRZ36lHExq1HL-L1UW4G0bkGpsNcfTNEtyPxALMu4INn0OhX0ZyuHww798jX2p0CelULHI2ic-4PEvIJby4Sxd_Oyzzvd7cv_emtU47d3SzeXyjww2HVeYOeuatwHcKE1WPPXEd2X1HmdHn4ulu5hw"/>
<p class="font-body text-secondary-fixed-dim tracking-[0.3em] uppercase text-[10px] font-bold opacity-80">The Digital Curator</p>
</header>
<!-- Login Card: Editorial Fluidity -->
<div class="w-full premium-card rounded-[2.5rem] p-8 md:p-10 relative overflow-hidden animate-in fade-in zoom-in-95 duration-700 delay-200">
<div class="relative z-10">
<div class="flex justify-between items-baseline mb-12">
<h2 class="font-headline text-4xl text-white tracking-tight">Welcome back</h2>
<span class="text-secondary-fixed/60 text-xs font-headline italic tracking-widest">Sétif, Algeria</span>
</div>
<form class="space-y-8">
<!-- Identity Field -->
<div class="space-y-3">
<label class="text-secondary-fixed-dim/60 text-[10px] uppercase tracking-[0.2em] font-bold px-1" for="login-identity">Identity</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-secondary-fixed transition-colors pointer-events-none" data-icon="person">person</span>
<input class="w-full h-16 pl-14 pr-6 glass-input rounded-2xl text-white placeholder:text-white/20 focus:ring-1 focus:ring-secondary-fixed/30 border-none transition-all outline-none text-base" id="login-identity" placeholder="Phone or email" type="text"/>
</div>
</div>
<!-- Secret Field -->
<div class="space-y-3">
<div class="flex justify-between items-center px-1">
<label class="text-secondary-fixed-dim/60 text-[10px] uppercase tracking-[0.2em] font-bold" for="login-password">Secret</label>
<a class="text-secondary-fixed/60 text-[10px] font-bold uppercase tracking-widest hover:text-white transition-colors" href="#">Lost credentials?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-secondary-fixed transition-colors pointer-events-none" data-icon="lock">lock</span>
<input class="w-full h-16 pl-14 pr-6 glass-input rounded-2xl text-white placeholder:text-white/20 focus:ring-1 focus:ring-secondary-fixed/30 border-none transition-all outline-none text-base" id="login-password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<div class="pt-2">
<button class="w-full h-16 bg-gradient-to-r from-primary to-primary-container text-white rounded-2xl font-bold tracking-widest uppercase text-xs btn-3d flex items-center justify-center gap-3 group" type="submit">
                        Access Heritage
                        <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Biometric Section -->
<div class="mt-12 pt-8 border-t border-white/5 flex flex-col items-center">
<p class="text-white/30 text-[9px] uppercase tracking-[0.3em] mb-6 font-bold">Secure biometric entry</p>
<button class="w-20 h-20 rounded-full border border-white/10 flex items-center justify-center text-white/40 hover:text-secondary-fixed hover:border-secondary-fixed/40 transition-all hover:bg-white/5 active:scale-95 group relative">
<div class="absolute inset-0 rounded-full border border-secondary-fixed/0 group-hover:border-secondary-fixed/20 group-hover:scale-110 transition-all duration-500"></div>
<span class="material-symbols-outlined text-4xl" data-icon="fingerprint">fingerprint</span>
</button>
</div>
</div>
<!-- Decorative Background Character -->
<div class="absolute top-4 right-6 pointer-events-none opacity-[0.03]">
<span class="font-headline text-white text-9xl">A</span>
</div>
</div>
<!-- Footer Actions -->
<footer class="mt-12 w-full flex flex-col items-center gap-8 animate-in fade-in slide-in-from-bottom-4 duration-1000 delay-500">
<div class="flex items-center gap-6 w-full max-w-xs">
<span class="h-[1px] flex-1 bg-white/5"></span>
<p class="text-white/40 text-xs tracking-tight">New to Ebzim?</p>
<span class="h-[1px] flex-1 bg-white/5"></span>
</div>
<button class="w-full max-w-[280px] h-12 rounded-full border border-secondary-fixed/20 text-secondary-fixed text-xs font-bold tracking-widest uppercase hover:bg-secondary-fixed/5 transition-all active:scale-[0.98]">
            Create Member Account
        </button>
<div class="flex items-center gap-6 mt-4">
<button class="text-white/30 text-[10px] uppercase tracking-widest hover:text-white transition-colors">Privacy</button>
<div class="w-1 h-1 rounded-full bg-white/10"></div>
<button class="text-white/30 text-[10px] uppercase tracking-widest hover:text-white transition-colors">Terms</button>
<div class="w-1 h-1 rounded-full bg-white/10"></div>
<button class="text-white/30 text-[10px] uppercase tracking-widest hover:text-white transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-xs" data-icon="language">language</span>
                Français
            </button>
</div>
</footer>
</main>
</body></html>
