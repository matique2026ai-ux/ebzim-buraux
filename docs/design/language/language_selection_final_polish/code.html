<div class="absolute inset-0 overflow-hidden pointer-events-none">

<div class="relative z-10 w-full max-w-xl flex flex-col items-center">

            </p>

<div class="flex flex-col gap-5 w-full">

</button>

<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</div>
</button>

</div>

<div class="mt-10 italic text-primary/20 text-2xl font-headline tracking-tighter">

</button>
