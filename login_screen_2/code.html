<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ebzim - Premium Authentication</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Manrope:wght@200..800&amp;family=Amiri:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#d3c5ad",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#eddec5",
                        "background": "#f9f9ff",
                        "surface-container-low": "#f3f3fa",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f0f0f7",
                        "on-tertiary-fixed-variant": "#92001f",
                        "tertiary-fixed": "#ffdad9",
                        "inverse-primary": "#82db6f",
                        "on-primary-fixed-variant": "#005300",
                        "on-secondary-fixed-variant": "#4f4533",
                        "surface-container": "#ededf4",
                        "surface-dim": "#d9d9e0",
                        "on-primary-container": "#86df72",
                        "primary-fixed": "#9df888",
                        "on-secondary-fixed": "#221b0b",
                        "on-tertiary-fixed": "#410008",
                        "inverse-surface": "#2e3036",
                        "surface": "#f9f9ff",
                        "secondary": "#685d4a",
                        "tertiary-fixed-dim": "#ffb3b2",
                        "on-error": "#ffffff",
                        "tertiary": "#82001b",
                        "surface-container-highest": "#e2e2e9",
                        "primary-container": "#006400",
                        "primary": "#004900",
                        "on-surface": "#191c20",
                        "primary-fixed-dim": "#82db6f",
                        "on-tertiary-container": "#ffb9b8",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#126e0c",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#f0e0c8",
                        "on-secondary-container": "#6c614e",
                        "surface-container-high": "#e7e8ee",
                        "on-background": "#191c20",
                        "surface-bright": "#f9f9ff",
                        "surface-variant": "#e2e2e9",
                        "outline": "#707a6a",
                        "outline-variant": "#bfcab7",
                        "tertiary-container": "#ae0027",
                        "on-primary-fixed": "#002200",
                        "on-surface-variant": "#404a3b",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Newsreader", "Amiri", "serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.6);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
        }
        .cinematic-bg {
            background: linear-gradient(135deg, #004900 0%, #002200 100%);
        }
        .calligraphy-fade {
            mask-image: linear-gradient(to bottom, transparent, black, transparent);
            opacity: 0.08;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center selection:bg-secondary-fixed">
<!-- Background Layer: Cinematic Heritage -->
<div class="fixed inset-0 z-0 overflow-hidden cinematic-bg">
<!-- Faded Arabic Calligraphy Pattern -->
<div class="absolute inset-0 calligraphy-fade flex items-center justify-center pointer-events-none select-none">
<div class="font-headline text-[25vw] leading-none text-surface-bright/40 whitespace-nowrap italic">
                الجزائر الثقافة التراث
            </div>
</div>
<!-- Ambient Light Overlay -->
<div class="absolute top-[-10%] right-[-5%] w-[500px] h-[500px] bg-primary-container/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[400px] h-[400px] bg-secondary-fixed/10 rounded-full blur-[100px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-xl px-6 py-12 md:py-24 flex flex-col items-center">
<!-- Brand Identity Section -->
<header class="text-center mb-12 flex flex-col items-center">
<div class="mb-6 w-20 h-20 rounded-full bg-surface-container-lowest flex items-center justify-center shadow-[0_0_40px_rgba(255,255,255,0.1)]">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="translate">translate</span>
</div>
<h1 class="font-headline text-5xl font-bold tracking-tight text-white mb-2 italic">Ebzim</h1>
<p class="font-body text-secondary-fixed-dim tracking-[0.2em] uppercase text-[10px] font-bold">The Digital Curator</p>
</header>
<!-- Login Card: Editorial Fluidity -->
<div class="w-full bg-white/5 backdrop-blur-3xl rounded-[2rem] p-8 md:p-12 shadow-2xl relative overflow-hidden ring-1 ring-white/10">
<div class="relative z-10">
<div class="flex justify-between items-baseline mb-10">
<h2 class="font-headline text-3xl text-white">Welcome back</h2>
<span class="text-secondary-fixed text-sm font-headline italic">Sétif, Algeria</span>
</div>
<form class="space-y-6">
<!-- Email/Phone Field -->
<div class="space-y-2">
<label class="text-secondary-fixed-dim text-xs uppercase tracking-widest px-2" for="login-identity">Identity</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/40 group-focus-within:text-secondary-fixed transition-colors" data-icon="person">person</span>
<input class="w-full h-14 pl-12 pr-4 glass-input rounded-2xl text-white placeholder:text-white/30 focus:ring-1 focus:ring-secondary-fixed/50 border-none transition-all outline-none" id="login-identity" placeholder="Phone or email" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-2">
<label class="text-secondary-fixed-dim text-xs uppercase tracking-widest" for="login-password">Secret</label>
<a class="text-secondary-fixed text-[11px] font-bold uppercase tracking-wider hover:text-white transition-colors" href="#">Lost credentials?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/40 group-focus-within:text-secondary-fixed transition-colors" data-icon="lock">lock</span>
<input class="w-full h-14 pl-12 pr-4 glass-input rounded-2xl text-white placeholder:text-white/30 focus:ring-1 focus:ring-secondary-fixed/50 border-none transition-all outline-none" id="login-password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action: Access Heritage -->
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-white rounded-2xl font-bold tracking-wide shadow-[0_10px_30px_rgba(0,73,0,0.3)] hover:shadow-[0_15px_40px_rgba(0,73,0,0.5)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                        Access Heritage
                        <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Biometric Placeholder -->
<div class="mt-8 pt-8 border-t border-white/5 flex flex-col items-center">
<p class="text-white/40 text-xs uppercase tracking-tighter mb-4">Secure biometric entry</p>
<button class="w-16 h-16 rounded-full border border-white/10 flex items-center justify-center text-white/60 hover:text-secondary-fixed hover:border-secondary-fixed/50 transition-all active:scale-90">
<span class="material-symbols-outlined text-4xl" data-icon="fingerprint">fingerprint</span>
</button>
</div>
</div>
<!-- Decorative Element: Subtle Ghost Border -->
<div class="absolute top-0 right-0 p-4">
<span class="font-headline text-white/5 text-8xl pointer-events-none">A</span>
</div>
</div>
<!-- Footer Actions -->
<footer class="mt-10 flex flex-col items-center gap-6">
<div class="flex items-center gap-4">
<span class="h-[1px] w-8 bg-white/10"></span>
<p class="text-white/60 text-sm">New to Ebzim?</p>
<span class="h-[1px] w-8 bg-white/10"></span>
</div>
<button class="px-8 py-3 rounded-full border border-secondary-fixed/30 text-secondary-fixed font-bold tracking-tight hover:bg-secondary-fixed/5 transition-colors">
                Create Member Account
            </button>
<div class="flex items-center gap-6 mt-4">
<button class="text-white/40 text-xs hover:text-white transition-colors">Privacy Policy</button>
<div class="w-1 h-1 rounded-full bg-white/20"></div>
<button class="text-white/40 text-xs hover:text-white transition-colors">Terms of Service</button>
<div class="w-1 h-1 rounded-full bg-white/20"></div>
<button class="text-white/40 text-xs hover:text-white transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-sm" data-icon="language">language</span>
                    Français
                </button>
</div>
</footer>
</main>
<!-- Suppressed Nav Shell for focused transactional experience as per rules -->
</body></html>
