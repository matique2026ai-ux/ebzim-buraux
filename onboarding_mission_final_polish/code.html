<style>

        }

            box-shadow: inset 0 1px 1px 0 rgba(255, 255, 255, 0.5);
        }
        html[dir="rtl"] .rtl-flip {
            transform: scaleX(-1);
        }
        .progress-dot {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

<body class="bg-surface font-body text-on-surface overflow-x-hidden">
<main class="relative min-h-screen flex flex-col items-center justify-between px-6 py-10 md:px-12 lg:px-24">

<div class="absolute top-1/2 -left-48 w-[32rem] h-[32rem] bg-secondary-fixed/20 rounded-full blur-[120px]"></div>
</div>
<!-- Header Row (Language & Branding) -->
<div class="w-full flex justify-between items-center z-20">
<div class="flex items-center gap-3">
<img alt="Ebzim Logo" class="h-10 md:h-12 w-auto object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ujSeLZIkdzaGhiRQtr3_b9JvTENUxNSA54RLVLcu_805fZmxdl_IRNstNyxqVb2UZ4Jero7oJ5E3er5m994XSG4bnBg7Z7qGWqhgYV31K3AzD3_Ky5V8bOjfuRZ36lHExq1HL-L1UW4G0bkGpsNcfTNEtyPxALMu4INn0OhX0ZyuHww798jX2p0CelULHI2ic-4PEvIJby4Sxd_Oyzzvd7cv_emtU47d3SzeXyjww2HVeYOeuatwHcKE1WPPXEd2X1HmdHn4ulu5hw"/>
</div>
<div class="flex bg-surface-container-low rounded-full p-1 border border-outline-variant/30 backdrop-blur-sm">
<button class="px-5 py-1.5 rounded-full text-xs font-label font-bold bg-primary text-on-primary shadow-sm transition-all duration-300">FR</button>
<button class="px-5 py-1.5 rounded-full text-xs font-label text-on-surface-variant hover:bg-surface-container transition-all duration-300">AR</button>
</div>
</div>
<!-- 3D/Premium Hero Section -->
<div class="relative w-full max-w-lg lg:max-w-2xl flex flex-col items-center py-8">
<!-- Main Illustration Container -->
<div class="relative w-full aspect-[4/5] md:aspect-square rounded-3xl overflow-hidden editorial-shadow glass-edge border border-white/40">
<img alt="Sétif Heritage" class="w-full h-full object-cover transition-all duration-1000 scale-105 hover:scale-100" data-alt="Luxurious 3D render of an ancient Algerian ceramic vessel with intricate emerald green patterns resting on a minimalist white marble pedestal under museum lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCkGYnKLT3hAEL8_qTt3CcZJbFAKTDDRROVU1gWsMbbDZz6xad_cpAf_ccCyLZIX7QN0H3qyk9abgvhRiWq439d9kCnQUKAXCo58WbPgUvIdill0Qg0bNDT1QX-euf26ZWKlzrln3JDvrjRqg_gCPJSKMy3VqIpPOil4DStR07BsvPg4tyzNoffxsE_YK3leo8i_ivV4MkpOSbH6eZEszS4BKrefP2HrfExOScmOCtBbl9sFFi4l23CRk0jemO7gMnHGyckGMPgHYT"/>
<!-- Subtle Tonal Gradient -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/30 via-transparent to-transparent"></div>
</div>
<!-- Refined Glassmorphic Floating Content -->
<div class="relative -mt-20 md:-mt-16 w-[92%] md:w-full bg-white/70 backdrop-blur-2xl p-8 rounded-3xl shadow-2xl glass-edge border border-white/80 z-10">
<div class="flex items-center gap-3 mb-4">
<div class="p-2 bg-primary/10 rounded-lg">
<span class="material-symbols-outlined text-primary text-xl" data-icon="museum">museum</span>
</div>
<span class="font-label text-[11px] uppercase tracking-[0.25em] text-secondary font-bold">The Heritage Foundation</span>
</div>
<h1 class="font-headline text-4xl md:text-5xl font-bold text-primary tracking-tight leading-[1.1] mb-5">
                A Legacy of <br/>
<span class="text-tertiary">Culture</span> &amp; Duty.
            </h1>
<p class="font-body text-on-surface-variant text-base md:text-lg leading-relaxed opacity-90 max-w-xl">
                Join Association Ebzim in our mission to curate the heritage of Sétif, bridging ancestral wisdom with the digital citizenship of tomorrow.
            </p>
</div>
</div>
<!-- Actions & Progress -->
<div class="w-full max-w-2xl flex flex-col items-center gap-12 z-20">
<!-- Refined Progress Indicators -->
<div class="flex gap-2.5">
<div class="progress-dot h-1.5 w-10 bg-primary rounded-full"></div>
<div class="progress-dot h-1.5 w-2.5 bg-outline-variant/40 rounded-full hover:bg-outline-variant transition-colors"></div>
<div class="progress-dot h-1.5 w-2.5 bg-outline-variant/40 rounded-full hover:bg-outline-variant transition-colors"></div>
</div>
<div class="w-full flex flex-col items-center gap-6">
<!-- Primary Action -->
<button class="group relative w-full max-w-xs flex items-center justify-center gap-4 px-8 py-5 rounded-2xl bg-primary text-on-primary font-label font-bold text-lg shadow-[0_15px_35px_rgba(0,73,0,0.25)] hover:shadow-[0_20px_45px_rgba(0,73,0,0.35)] active:scale-95 transition-all duration-300">
<span>Begin Journey</span>
<span class="material-symbols-outlined rtl-flip transition-transform group-hover:translate-x-1.5" data-icon="arrow_forward">arrow_forward</span>
<!-- Inner Glow Effect -->
<div class="absolute inset-0 rounded-2xl ring-1 ring-white/20 inset-shadow-sm pointer-events-none"></div>
</button>
<!-- Secondary/Skip Action (Unified Style) -->
<button class="font-label text-xs uppercase tracking-[0.25em] text-on-surface-variant/60 hover:text-primary hover:tracking-[0.3em] transition-all duration-500 py-3">
                Skip to Heritage
            </button>
</div>
</div>
<!-- Bottom Gradient Accent -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
</main>
<script>
    // Language switching mockup logic for RTL/LTR demonstration
    document.querySelectorAll('button').forEach(btn => {
        if(btn.innerText === 'AR') {
            btn.onclick = () => {
                document.documentElement.setAttribute('dir', 'rtl');
                document.documentElement.setAttribute('lang', 'ar');
            };
        }
        if(btn.innerText === 'FR') {
            btn.onclick = () => {
                document.documentElement.setAttribute('dir', 'ltr');
                document.documentElement.setAttribute('lang', 'en');
            };
        }
    });
</script>
</body></html>
